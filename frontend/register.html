<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MOVIEMania</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden; /* prevent scrolling on login page */
        }

        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transform: scale(1.05); /* Slight zoom for premium feel */
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Dark gradient overlay matching Netflix vibe */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        /* Center Header Area */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            color: #e50914;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        .logo span {
            color: white;
            font-weight: 300;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 400;
            color: #e5e5e5;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        /* Glassmorphism Auth Container */
        .auth-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease-out;
        }

        .auth-container h2 { 
            margin-bottom: 28px; 
            font-size: 32px; 
            font-weight: 600; 
        }

        .input-group { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background-color: rgba(51, 51, 51, 0.6);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #aaa;
        }

        input:focus { 
            outline: none;
            border-color: #e50914; 
            background-color: rgba(51, 51, 51, 0.9); 
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s ease;
        }

        button:hover { 
            background-color: #f40612; 
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        .error-msg {
            color: #ff4d4d;
            background: rgba(229, 9, 20, 0.15);
            border-left: 4px solid #e50914;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-msg {
            color: #46d369;
            background: rgba(70, 211, 105, 0.15);
            border-left: 4px solid #46d369;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .toggle-text {
            color: #b3b3b3;
            margin-top: 25px;
            font-size: 16px;
        }

        .toggle-text a { 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            transition: 0.2s;
        }

        .toggle-text a:hover { 
            text-decoration: underline; 
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .auth-container {
                padding: 40px 30px;
            }
            .logo {
                font-size: 2.8rem;
            }
            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- Main Content -->
    <div class="page-container">
        <div class="header-section">
            <h1 class="logo">MOVIE<span>Mania</span></h1>
            <p class="tagline">Discover Your Next Favorite Movie</p>
        </div>

        <div class="auth-container">
            <h2>Sign Up</h2>
            <div id="error-box" class="error-msg"></div>
            <div id="success-box" class="success-msg"></div>
            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Choose a Username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Create a Password" required>
                </div>
                <button type="submit" id="submit-btn">Sign Up</button>
            </form>
            <div class="toggle-text">
                Already have an account? <a href="login.html">Sign in.</a>
            </div>
        </div>
    </div>

    <!-- Script Logic -->
    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000';
        const form = document.getElementById('register-form');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const res = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    successBox.textContent = 'Account created successfully! Redirecting to Login...';
                    successBox.style.display = 'block';
                    
                    // Auto-redirect to login page
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorBox.textContent = data.error || 'Registration failed';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Make sure Flask backend is running on port 5000.';
                errorBox.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
